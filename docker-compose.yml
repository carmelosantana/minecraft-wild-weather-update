# Minecraft Java Paper Server + Wild Weather Update Plugin Docker Container
# https://github.com/TheRemote/Legendary-Java-Minecraft-Geyser-Floodgate
services:
  minecraftbe:
    image: 05jchambers/legendary-minecraft-geyser-floodgate:latest
    restart: "unless-stopped"
    ports:
      - "${XPFARM_JAVA_PORT:-25565}:${XPFARM_JAVA_PORT:-25565}"
      - "${XPFARM_BEDROCK_PORT:-19132}:${XPFARM_BEDROCK_PORT:-19132}"
      - "${XPFARM_BEDROCK_PORT:-19132}:${XPFARM_BEDROCK_PORT:-19132}/udp"
    volumes:
      - minecraft:/minecraft
      - ./target/wild-weather-update-1.0.0-SNAPSHOT.jar:/minecraft/plugins/wild-weather-update-1.0.0-SNAPSHOT.jar
    stdin_open: true # docker run -i
    tty: true # docker run -t
    entrypoint: ["/bin/bash", "/scripts/start.sh"]
    environment:
      Port: "${XPFARM_JAVA_PORT:-25565}"
      BedrockPort: "${XPFARM_BEDROCK_PORT:-19132}"
      TZ: "America/New_York"
      MaxMemory: 4096
      Version: "26.1.2" # Paper target; image always takes the latest build
      NoBackup: "plugins" # Optional folder to skip during backups
      NoPermCheck: "Y" # Optional flag to skip permissions check
      # NoViaVersion: "Y" # Enable ViaVersion for Geyser compatibility
      QuietCurl: "Y" # Optional flag to reduce curl log output
volumes:
  minecraft:
    driver: local
